# Domain profile: invoice (billing/invoice family)
#
# Declarative data consumed by compile_workflow.py. When a prompt.yaml declares
# `domain: invoice` and a group has no explicit `slot:`, the compiler resolves
# that group's workflow slot from the `groups` map below. This is the single
# source of truth for the invoice group decomposition; references/domains/
# invoice.md describes it for the methodology.
#
# Precedence in the compiler: an explicit per-group `slot:` always overrides
# this profile. A group that matches neither an explicit slot nor a profile
# entry is a hard compile error.
#
# `slot` values must be on the proven slot allow-list (see
# validate_workflow_json.py / references/2_schema_design.md):
#   chunk-instruct  -> singleton per-document object (X-Ray sectionSummary)
#   chunk-keys      -> repeating record array        (X-Ray chunkKeywords)
#   chunk-summary   -> repeating record array        (X-Ray chunkSummary)

name: invoice
groups:
  statement: chunk-instruct
  charges: chunk-keys
  meters: chunk-summary
