# GroundX extraction schema — starter
#
# This file is the durable artifact of a groundx-extraction-workflows run. The agent
# drafts it for a specific document type; the user edits and versions it.
#
# This starter enables two common custom steps:
#
#   statement_fields: per-document fields. Each chunk contributes partial
#                     fields, and the platform reconciles them into one flat
#                     object.
#
#   charge_lines: repeating records (line items, transactions, etc.). Each
#                 chunk contributes complete records, and the platform
#                 aggregates them into an array.
#
# It also shows an optional `meter_lines` step with the commented `meters`
# group below. Uncomment the step and the group together; a custom step with
# no routed fields is invalid.
#
# Omit groups that do not apply to the document type.
#
# See references/2_schema_design.md for the field anatomy and group
# decomposition rules.

workflow:
  custom_steps:
    - name: statement_fields
      level: chunk
      kind: instruct
    - name: charge_lines
      level: chunk
      # `keys` means each chunk can return zero or more complete records.
      # Use this for repeating rows such as charges, line items, transactions,
      # or service rows.
      kind: keys
    # Add this step with the `meters` group below when the document has
    # physical-meter or metered-usage records.
    # - name: meter_lines
    #   level: chunk
    #   kind: summary

statement:
  workflow_step: statement_fields
  fields:
    # Replace these illustrative entries with the fields you need to
    # extract. Each field's YAML key becomes the JSON key in the
    # extraction output.
    document_id_example:
      workflow_output_key: document_id_example
      prompt:
        description: a short human description of what this field represents
        format: string
        identifiers:
          - The label or labels that appear next to this value on the document
        instructions: |
          - One concrete instruction per line
          - Note edge cases ("if value is missing, infer from X")
          - Note formatting expectations ("strip spaces", "two-letter state")
        type: str

charges:
  workflow_step: charge_lines
  fields:
    # Replace these illustrative entries with the fields that describe one
    # repeating record. The platform will produce an array of objects with
    # this shape.
    #
    # IMPORTANT: the GroundX platform requires two hardcoded field names
    # for charge-style extractions:
    #
    #   - charge_amount                   (numeric value)
    #   - charge_description_as_printed   (verbatim description)
    #
    # See references/6_known_limitations.md for the workaround pattern
    # (alias mapping in score_extraction.py).
    charge_description_as_printed:
      workflow_output_key: charge_description_as_printed
      prompt:
        description: the description of this individual record exactly as printed
        identifiers:
          - Description
          - Item
        instructions: |
          - Copy verbatim from the document
          - Do not include monetary amounts in the description
        type: str
    charge_amount:
      workflow_output_key: charge_amount
      prompt:
        description: the numeric value associated with this record
        identifiers:
          - Amount
        instructions: |
          - Extract only the numeric value; remove currency symbols
          - May be negative
        type:
          - int
          - float
  prompt:
    instructions: |
      Extract every individual record. Do not extract section headers,
      subtotal lines, or rolled-up summaries.

      A record IS:
        - One distinct line item with its own description and value

      A record is NOT:
        - A subtotal or section header
        - A summary line aggregating multiple items
        - A previous balance, payment, or carry-forward

