# service.yaml — groundx-agent-harness. DERIVED ARTIFACT — see generated_from.
# Conforms to service.schema v1.0.0.
apiVersion: v1

repo:
  name: groundx-agent-harness
  workspace: groundx
  role: plugin
  description: PUBLIC agent-skills bundle for GroundX — generated mirror of groundx-studio-harness.
  owner: Ben Fletcher
  bundle_version: 2.1.3               # NOTE: AHEAD of source studio-harness 2.1.1 — see generated_from

# THE defining fact: this is not an independent node.
generated_from:
  source: groundx-studio-harness
  via: sync-plugin.mjs (upstream, in studio-harness)
  provenance_file: .groundx-generated.json
  agent_editable: false              # edits here are OVERWRITTEN on next sync — change upstream
  version_lock: none                 # bundle 2.1.3 vs source 2.1.1 (both read live 2026-06-08) — sync does not propagate/enforce version
  conversion_status: DERIVED — no independent OpenSpec/Superpowers lifecycle

stack:
  language: markdown                 # the product is Markdown skills
  tooling: node (>=20, stdlib only, no package.json)

contracts:
  - kind: plugin-bundle
    surface: ".claude-plugin/marketplace.json (+ codex, agents variants)"
    schematized: true
    note: 7 public skills, name constant groundx-agent-harness

dependencies:
  internal:
    - name: groundx-studio-harness
      kind: generator-source           # the inverse of studio-harness's generates
      direction: outbound
    - name: groundx-python
      kind: reference-only             # extraction templates use the SDK; skill defers to its AGENTS.md (6 refs)
      direction: outbound
  external:
    - { name: groundx-api, kind: http-api, surface: mcp, endpoint: "api.groundx.ai/mcp (primary, 16 refs)", auth: x-api-key, schematized: false, note: REST api/v1 as fallback }
    - { name: groundx-upload-service, kind: object-store, endpoint: "upload.eyelevel.ai / api.eyelevel.ai/upload/file", schematized: false }

agent_boundaries:
  - zone: entire repo
    rule: generated mirror — do not hand-edit; change groundx-studio-harness upstream
    gate: scripts/validate-public-bundle.mjs (provenance + 18-string private-leak scan + secret scan)

quality_gates:
  - "node scripts/validate-public-bundle.mjs (publication/leak gate)"

conversion:
  status: derived-no-conversion
  onboarded_at: 2026-06-07
  architecture_notes: ARCHITECTURE_NOTES.md
  note: onboarding kept for reference; this repo is NOT converted independently — its source is groundx-studio-harness
